# DVC Pipeline Template for QualCoder v2 Research Workflows
#
# Copy this file to your project directory as `dvc.yaml` and customize.
# Each stage defines a step in your research data pipeline.
#
# Usage:
#   dvc repro                    # Run all stages
#   dvc repro aggregate-data     # Run a specific stage
#   dvc push                     # Push tracked data to S3 remote
#
# See: https://dvc.org/doc/user-guide/pipelines

stages:
  # Stage 1: Aggregate Firebase Analytics into participant profiles
  # Runs the aggregation script on raw BigQuery export JSON,
  # producing a CSV ready for QualCoder case attribute import.
  aggregate-firebase:
    cmd: >
      python scripts/aggregate_firebase.py
      --input data/raw/firebase_export.json
      --output data/processed/participant_profiles.csv
    deps:
      - data/raw/firebase_export.json
      - scripts/aggregate_firebase.py
    outs:
      - data/processed/participant_profiles.csv

  # Stage 2: Import participant profiles as QualCoder case attributes
  # Imports the aggregated CSV into a QualCoder project as typed Case attributes.
  # Uses the MCP import_data tool with format=firebase_csv.
  import-profiles:
    cmd: >
      python -m src.contexts.storage.scripts.import_profiles
      --input data/processed/participant_profiles.csv
      --project ${PROJECT_PATH}
    deps:
      - data/processed/participant_profiles.csv
      - src/contexts/storage/scripts/import_profiles.py
    outs:
      - data/imported/

  # Stage 3: Export coded results for analysis
  # Exports coded segments, memos, and case attributes.
  export-results:
    cmd: >
      python -m src.contexts.storage.scripts.export_results
      --project ${PROJECT_PATH}
      --format qdpx
      --output data/exports/
    deps:
      - data/imported/
      - src/contexts/storage/scripts/export_results.py
    outs:
      - data/exports/

  # Stage 4: Triangulation analysis (optional)
  # Cross-reference coded data with analytics for mixed-methods research.
  triangulate:
    cmd: >
      python -m src.contexts.storage.scripts.triangulate
      --coded data/exports/
      --analytics data/raw/analytics.json
      --output data/triangulated/
    deps:
      - data/exports/
      - data/raw/analytics.json
    outs:
      - data/triangulated/
    # metrics:
    #   - data/triangulated/metrics.json:
    #       cache: false
