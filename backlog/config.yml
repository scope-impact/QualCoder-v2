project_name: "QualCoder v2"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels:
  - tier-1
  - tier-2
  - tier-3
  - tier-4
  - tier-5
  - parallel
  - coding
  - technical
  - focus
  - agent
milestones:
  - "Tier 1: Foundation"
  - "Tier 2: Core Coding"
  - "Tier 3: Specialized Coding"
  - "Tier 4: Analysis"
  - "Tier 5: Collaboration & AI"
  - "Parallel Track"
date_format: yyyy-mm-dd
max_column_width: 20
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
zero_padded_ids: 3
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "qc"
